<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <title>Login - Clinic Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">&#x2665;</div>
        <h1 class="login-title">Clinic Management System</h1>
        <p class="login-subtitle">CCS6344 &mdash; Database &amp; Cloud Security</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="Enter your username"
                       required maxlength="50" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter your password"
                       required maxlength="128" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:#a0aec0;">
            Demo credentials: admin / Admin@123
        </p>
    </div>
</div>
</body>
</html>
