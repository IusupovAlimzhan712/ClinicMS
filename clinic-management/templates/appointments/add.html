{% extends "base.html" %}
{% block title %}Schedule Appointment - ClinicMS{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Schedule Appointment</h1>
    <a href="{{ url_for('appointments_list') }}" class="btn btn-secondary">Back</a>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('appointments_add') }}">
        <div class="form-grid">
            <div class="form-group">
                <label for="patient_id">Patient <span class="required">*</span></label>
                <select id="patient_id" name="patient_id" required>
                    <option value="">Select patient</option>
                    {% for p in patients %}
                    <option value="{{ p['id'] }}"
                        {% if form.get('patient_id')|string == p['id']|string %}selected{% endif %}>
                        {{ p['full_name'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="doctor_id">Doctor <span class="required">*</span></label>
                <select id="doctor_id" name="doctor_id" required>
                    <option value="">Select doctor</option>
                    {% for d in doctors %}
                    <option value="{{ d['id'] }}"
                        {% if form.get('doctor_id')|string == d['id']|string %}selected{% endif %}>
                        {{ d['full_name'] }} &mdash; {{ d['specialization'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="appointment_date">Date <span class="required">*</span></label>
                <input type="date" id="appointment_date" name="appointment_date"
                       value="{{ form.get('appointment_date','') }}" required
                       min="{{ now.strftime('%Y-%m-%d') if now else '' }}">
            </div>
            <div class="form-group">
                <label for="appointment_time">Time <span class="required">*</span></label>
                <input type="time" id="appointment_time" name="appointment_time"
                       value="{{ form.get('appointment_time','09:00') }}" required>
            </div>
            <div class="form-group form-row-full">
                <label for="reason">Reason for Visit <span class="required">*</span></label>
                <input type="text" id="reason" name="reason"
                       value="{{ form.get('reason','') }}"
                       required maxlength="255" placeholder="e.g. General check-up, fever, follow-up">
            </div>
            <div class="form-group form-row-full">
                <label for="notes">Additional Notes</label>
                <textarea id="notes" name="notes" maxlength="500"
                          placeholder="Any additional information for the doctor">{{ form.get('notes','') }}</textarea>
            </div>
        </div>

        <div style="display:flex;gap:0.75rem;margin-top:1rem;">
            <button type="submit" class="btn btn-primary">Schedule</button>
            <a href="{{ url_for('appointments_list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
