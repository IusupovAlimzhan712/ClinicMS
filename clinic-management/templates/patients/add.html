{% extends "base.html" %}
{% block title %}Add Patient - ClinicMS{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add New Patient</h1>
    <a href="{{ url_for('patients_list') }}" class="btn btn-secondary">Back</a>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('patients_add') }}">
        <div class="form-grid">
            <div class="form-group">
                <label for="full_name">Full Name <span class="required">*</span></label>
                <input type="text" id="full_name" name="full_name"
                       value="{{ form.get('full_name','') }}"
                       required maxlength="100" placeholder="As per IC">
            </div>
            <div class="form-group">
                <label for="ic_number">IC Number <span class="required">*</span></label>
                <input type="text" id="ic_number" name="ic_number"
                       value="{{ form.get('ic_number','') }}"
                       required maxlength="14" placeholder="YYMMDD-SS-XXXX"
                       pattern="\d{6}-\d{2}-\d{4}">
            </div>
            <div class="form-group">
                <label for="date_of_birth">Date of Birth <span class="required">*</span></label>
                <input type="date" id="date_of_birth" name="date_of_birth"
                       value="{{ form.get('date_of_birth','') }}" required>
            </div>
            <div class="form-group">
                <label for="gender">Gender <span class="required">*</span></label>
                <select id="gender" name="gender" required>
                    <option value="">Select gender</option>
                    <option value="male"   {% if form.get('gender')=='male'   %}selected{% endif %}>Male</option>
                    <option value="female" {% if form.get('gender')=='female' %}selected{% endif %}>Female</option>
                    <option value="other"  {% if form.get('gender')=='other'  %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="phone">Phone <span class="required">*</span></label>
                <input type="text" id="phone" name="phone"
                       value="{{ form.get('phone','') }}"
                       required maxlength="15" placeholder="+601XXXXXXXX">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       value="{{ form.get('email','') }}" maxlength="100">
            </div>
            <div class="form-group form-row-full">
                <label for="address">Address <span class="required">*</span></label>
                <textarea id="address" name="address" required maxlength="500"
                          placeholder="Full residential address">{{ form.get('address','') }}</textarea>
            </div>
            <div class="form-group">
                <label for="blood_type">Blood Type</label>
                <select id="blood_type" name="blood_type">
                    <option value="">Unknown</option>
                    {% for bt in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
                    <option value="{{ bt }}" {% if form.get('blood_type')==bt %}selected{% endif %}>{{ bt }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="emergency_contact_name">Emergency Contact Name</label>
                <input type="text" id="emergency_contact_name" name="emergency_contact_name"
                       value="{{ form.get('emergency_contact_name','') }}" maxlength="100">
            </div>
            <div class="form-group">
                <label for="emergency_contact_phone">Emergency Contact Phone</label>
                <input type="text" id="emergency_contact_phone" name="emergency_contact_phone"
                       value="{{ form.get('emergency_contact_phone','') }}" maxlength="15">
            </div>
            <div class="form-group form-row-full">
                <label style="display:flex;align-items:flex-start;gap:0.75rem;cursor:pointer;">
                    <input type="checkbox" name="consent_given" value="1"
                           {% if form.get('consent_given') %}checked{% endif %}
                           style="width:auto;margin-top:2px;">
                    <span>
                        <strong>PDPA 2010 Consent <span class="required">*</span></strong><br>
                        <small style="color:#718096;">
                            I consent to the collection, processing, and storage of my personal data
                            by this clinic in accordance with the Personal Data Protection Act 2010 (PDPA).
                            Data will only be used for medical and administrative purposes.
                        </small>
                    </span>
                </label>
            </div>
        </div>

        <div style="display:flex;gap:0.75rem;margin-top:1rem;">
            <button type="submit" class="btn btn-primary">Save Patient</button>
            <a href="{{ url_for('patients_list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
